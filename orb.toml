[agent]
name = "browser-agent"
lang = "python"
entry = "agent.py"

[source]
git = "https://github.com/nextbysam/orb-browser.git"
branch = "main"

[build]
steps = [
  "pip install playwright fastapi uvicorn httpx",
  "PLAYWRIGHT_BROWSERS_PATH=/opt/browsers playwright install chromium",
]
working_dir = "/agent/code"

[agent.env]
PLAYWRIGHT_BROWSERS_PATH = "/opt/browsers"
BUILTIN_LLM_KEY = "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"

[lifecycle]
idle_timeout = "3600s"

[backend]
provider = "custom"
additional_domains = ["openrouter.ai", "api.z.ai", "open.bigmodel.cn"]

[ports]
expose = [8000]
